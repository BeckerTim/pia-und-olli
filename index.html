<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pia & Olli - 06.06.2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #faf6f0;
      --gold: #b8935a;
      --gold-light: #d4b483;
      --dark: #2c2c2c;
      --sage: #6b7c5e;
      --sage-light: #8a9b7a;
    }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background-color: var(--cream);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(184, 147, 90, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(107, 124, 94, 0.06) 0%, transparent 50%);
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .ornament {
      color: var(--gold);
      font-size: 1.5rem;
      letter-spacing: 0.5rem;
      margin-bottom: 0.5rem;
      opacity: 0.7;
    }

    .names {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.8rem;
      font-weight: 400;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 0.25rem;
    }

    .names .amp {
      font-style: italic;
      color: var(--gold);
      display: inline-block;
      margin: 0 0.15em;
    }

    .date {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 300;
      color: var(--sage);
      letter-spacing: 0.1em;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--gold-light);
      margin: 0 auto 2.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.5rem;
      background: white;
      border: 1px solid rgba(184, 147, 90, 0.2);
      border-radius: 4px;
      text-decoration: none;
      color: var(--dark);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .link-card:hover {
      border-color: var(--gold);
      box-shadow: 0 4px 20px rgba(184, 147, 90, 0.12);
      transform: translateY(-2px);
    }

    .link-icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--cream);
      border: 1px solid rgba(184, 147, 90, 0.2);
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .link-text {
      text-align: left;
    }

    .link-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.15rem;
    }

    .link-desc {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--sage);
    }

    .link-arrow {
      margin-left: auto;
      color: var(--gold-light);
      font-size: 1.2rem;
      transition: transform 0.3s ease;
    }

    .link-card:hover .link-arrow {
      transform: translateX(3px);
      color: var(--gold);
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--sage-light);
      letter-spacing: 0.05em;
    }

    @media (max-width: 480px) {
      .names {
        font-size: 2.2rem;
      }
      .link-card {
        padding: 1rem 1.2rem;
      }
    }
  </style>
</head>
<body>

        <div class="link-text">

        <div class="link-text">
          <div class="link-title">Spiel</div>

        </div>
        <span class="link-arrow">&rsaquo;</span>
      </a>

      <a href="#" class="link-card">
        <div class="link-icon">

        <div class="link-text">

        </div>
        <span class="link-arrow">&rsaquo;</span>

    </div>

    <p class="footer">Wir freuen uns auf euch!</p>

</body>
</html>
